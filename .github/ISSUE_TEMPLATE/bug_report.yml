name: Bug Report
description: Create a report to help us fix a bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Before submitting, please make sure to search the existing issues to see if it has already been reported.
  - type: input
    id: version
    attributes:
      label: Whisp Version
      description: What version of Whisp are you using? (e.g., Flathub 1.3.3)
      placeholder: "e.g. 1.3.3"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: Which Linux distribution are you using?
      placeholder: "e.g. Fedora 40, Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How do we reproduce this issue?
      value: |
        1. Open Whisp
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
    validations:
      required: true
